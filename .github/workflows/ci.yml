name: Backend CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      COMPOSE_PROJECT_NAME: milktrack-ci-${{ github.run_id }}-${{ github.run_attempt }}
      DATABASE_URL: postgresql://milktrack_app:milktrack_app_local@postgres:5432/milktrack
      MIGRATION_DATABASE_URL: postgresql://milktrack_owner:milktrack_owner_local@postgres:5432/milktrack
      AUTH_HMAC_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      MFA_ENCRYPTION_KEY: ZmVkY2JhOTg3NjU0MzIxMGZlZGNiYTk4NzY1NDMyMTA=
      SESSION_TTL_SECONDS: 2592000
      APP_ENV: test
      OTP_PROVIDER: local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify application
        run: npm run verify

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Check migration drift
        run: npm run test:migration-drift

      - name: Run integration tests
        run: npm run test:integration

      - name: Run security release gate
        run: bash test/security-release.sh

      - name: Check OpenAPI drift
        run: npm run openapi:check

      - name: Check supported-client compatibility
        run: npm run test:openapi-compatibility

      - name: Validate Compose contract
        run: bash test/compose-contract.sh

      - name: Build production image
        run: docker build --target production -t milktrack-backend:ci .

      - name: Audit production dependencies
        run: docker run --rm --entrypoint npm milktrack-backend:ci audit --omit=dev --omit=optional

      - name: Check production runtime contract
        run: bash test/runtime-contract.sh milktrack-backend:ci

      - name: Check retained database volume
        run: bash test/retained-volume-contract.sh

  publish-openapi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish OpenAPI release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" openapi/v1.json --clobber
          else
            gh release create "$GITHUB_REF_NAME" openapi/v1.json --generate-notes --verify-tag
          fi
